<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" fill="none">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A84B"/>
      <stop offset="55%" stop-color="#C8963E"/>
      <stop offset="100%" stop-color="#A67830"/>
    </linearGradient>
  </defs>

  <!-- AS Monogram -->
  <g transform="translate(0,0) scale(1)">
    <polygon points="26,166 58,34 74,34 42,166" fill="url(#goldGrad)"/>
    <polygon points="74,34 90,34 122,166 106,166" fill="url(#goldGrad)"/>
    <polygon points="46,118 54,90 96,90 104,118" fill="url(#goldGrad)"/>
    <!-- S in dark navy for light backgrounds -->
    <path d="M86,34 L164,34 L164,64 L112,64 L112,90 L164,90 L164,166 L86,166 L86,136 L138,136 L138,112 L86,112 Z" fill="#1a2233"/>
    <path d="M94,42 L156,42 L156,56 L112,56 L112,64 L94,64 Z" fill="url(#goldGrad)"/>
    <path d="M94,136 L112,136 L112,144 L156,144 L156,158 L94,158 Z" fill="url(#goldGrad)"/>
  </g>

  <!-- Divider -->
  <line x1="184" y1="56" x2="184" y2="148" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.5"/>

  <!-- AUREVON text in dark navy -->
  <text x="200" y="118"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="46"
    font-weight="300"
    letter-spacing="14"
    fill="#1a2233">AUREVON</text>

  <!-- STUDIOS -->
  <line x1="200" y1="140" x2="236" y2="140" stroke="url(#goldGrad)" stroke-width="1"/>
  <text x="244" y="148"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="13"
    font-weight="400"
    letter-spacing="8"
    fill="url(#goldGrad)">STUDIOS</text>
  <line x1="364" y1="140" x2="400" y2="140" stroke="url(#goldGrad)" stroke-width="1"/>
</svg>
